apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "app.fullname" . }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
spec:
  to:
    kind: Service
    name: {{ include "app.fullname" . }}-svc
    weight: 100
  port:
    targetPort: {{ .Values.app.ports.serverPort.port }}
  tls:
    termination: edge