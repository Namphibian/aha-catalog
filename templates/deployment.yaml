apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
  {{- if and .Values.app.deployment .Values.app.deployment.annotations }}
  annotations:
    {{- include "app.annotations" (list .Values.app.deployment.annotations .) | trim | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ include "app.configValue" (list .Values.app.replicaCount .Values.app.configData "deployment replicas") }}
  selector:
    matchLabels:
      {{- include "app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "app.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.app.image.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $root := . }}
      {{- $pmap := $root.Values.app.persistence | default dict }}
      {{- $fmap := $root.Values.app.files | default (list) }}
      containers:
      - name: {{ $root.Chart.Name }}
        image: {{ $root.Values.app.image.repository }}:{{ $root.Values.app.image.tag }}
        imagePullPolicy: {{ $root.Values.app.image.pullPolicy }}
        ports:
        {{- range $pkey, $p := $root.Values.app.ports }}
          {{- if $p.containerPort  }}
          - name: {{ lower $p.name }}
            containerPort: {{ include "app.resolvePort" (list $p.port $root.Values.app.configData (printf "container port %s" $pkey)) }}
            protocol: {{ $p.protocol | default "TCP" }}
          {{- end  }}
        {{- end }}
        env:
          {{- range $key, $value := $root.Values.app.env }}
          {{- if and (kindIs "map" $value) (hasKey $value "configDataKey") }}
          {{- $cfgKey := index $value "configDataKey" }}
          {{- $entry := index $root.Values.app.configData $cfgKey }}
          {{- if hasKey $entry "description" }}
          # {{ index $entry "description" }}
          {{- end }}
          {{- end }}
          - name: {{ $key }}
            value: '{{ include "app.envValue" (list $value $root.Values.app.configData (printf "env %s" $key)) }}'
          {{- end }}
        # Liveness Probe
        {{- $liveKey := $root.Values.app.probes.liveness.tcpSocket.port }}
        {{- $livePort := index $root.Values.app.ports $liveKey }}
        livenessProbe:
          tcpSocket:
            port: {{ include "app.resolvePort" (list $livePort.port $root.Values.app.configData "liveness probe") }}
          initialDelaySeconds: {{ $root.Values.app.probes.liveness.initialDelaySeconds }}
          periodSeconds: {{ $root.Values.app.probes.liveness.periodSeconds }}
          timeoutSeconds: {{ $root.Values.app.probes.liveness.timeoutSeconds }}
          failureThreshold: {{ $root.Values.app.probes.liveness.failureThreshold }}
        # Readiness Probe
        {{- $readyKey := $root.Values.app.probes.readiness.tcpSocket.port }}
        {{- $readyPort := index $root.Values.app.ports $readyKey }}
        readinessProbe:
          tcpSocket:
            port: {{ include "app.resolvePort" (list $readyPort.port $root.Values.app.configData "readiness probe") }}
          initialDelaySeconds: {{ $root.Values.app.probes.readiness.initialDelaySeconds }}
          periodSeconds: {{ $root.Values.app.probes.readiness.periodSeconds }}
          timeoutSeconds: {{ $root.Values.app.probes.readiness.timeoutSeconds }}
          failureThreshold: {{ $root.Values.app.probes.readiness.failureThreshold }}
        {{- $qos := $root.Values.app.resources.qos | default "Guaranteed" }}
        {{- if ne $qos "BestEffort" }}
        resources:
          {{- if eq $qos "Guaranteed" }}
          requests:
            cpu: {{ include "app.configValue" (list $root.Values.app.resources.limits.cpu $root.Values.app.configData "resources limits cpu") }}m
            memory: {{ include "app.configValue" (list $root.Values.app.resources.limits.memory $root.Values.app.configData "resources limits memory") }}
          limits:
            cpu: {{ include "app.configValue" (list $root.Values.app.resources.limits.cpu $root.Values.app.configData "resources limits cpu") }}m
            memory: {{ include "app.configValue" (list $root.Values.app.resources.limits.memory $root.Values.app.configData "resources limits memory") }}
          {{- end }}
          {{- if eq $qos "Burstable" }}
          requests:
            cpu: {{ include "app.configValue" (list $root.Values.app.resources.requests.cpu $root.Values.app.configData "resources requests cpu") }}m
            memory: {{ include "app.configValue" (list $root.Values.app.resources.requests.memory $root.Values.app.configData "resources requests memory") }}
          {{- end }}
          {{- if eq $qos "Burstable" }}
          {{- if $root.Values.app.resources.limits }}
          limits:
            {{- if $root.Values.app.resources.limits.cpu }}
            cpu: {{ include "app.configValue" (list $root.Values.app.resources.limits.cpu $root.Values.app.configData "resources limits cpu") }}m
            {{- end }}
            {{- if $root.Values.app.resources.limits.memory }}
            memory: {{ include "app.configValue" (list $root.Values.app.resources.limits.memory $root.Values.app.configData "resources limits memory") }}
            {{- end }}
          {{- end }}
          {{- end }}
        {{- end }}
        {{- if or (gt (len $pmap) 0) (gt (len $fmap) 0) }}
        volumeMounts:
        {{- range $vname, $vcfg := $pmap }}
          - name: '{{ printf "%s-%s" (trim (include "app.fullname" $root)) (trim (include "app.kebab" $vname)) }}'
            mountPath: {{ $vcfg.mountPath }}
        {{- end }}
        {{- range $idx, $fcfg := $fmap }}
          - name: '{{ include "app.fileResourceName" (list $root $fcfg $idx) }}'
            {{- if $fcfg.subPath }}
            mountPath: '{{ printf "%s/%s" (trimSuffix "/" $fcfg.mountPath) $fcfg.subPath }}'
            subPath: '{{ $fcfg.subPath }}'
            {{- else }}
            mountPath: {{ $fcfg.mountPath }}
            {{- end }}
            readOnly: true
        {{- end }}
        {{- end }}
      {{- if or (gt (len $pmap) 0) (gt (len $fmap) 0) }}
      volumes:
        {{- range $vname, $vcfg := $pmap }}
        - name: '{{ printf "%s-%s" (trim (include "app.fullname" $root)) (trim (include "app.kebab" $vname)) }}'
          persistentVolumeClaim:
            claimName: '{{ default (printf "%s-%s" (trim (include "app.fullname" $root)) (trim (include "app.kebab" $vname))) $vcfg.claimName }}'
        {{- end }}
        {{- range $idx, $fcfg := $fmap }}
        - name: '{{ include "app.fileResourceName" (list $root $fcfg $idx) }}'
          {{- if eq (lower (default "configmap" $fcfg.type)) "secret" }}
          secret:
            secretName: '{{ include "app.fileResourceName" (list $root $fcfg $idx) }}'
            items:
              - key: '{{ default "content" $fcfg.subPath }}'
                path: '{{ default "content" $fcfg.subPath }}'
          {{- else }}
          configMap:
            name: '{{ include "app.fileResourceName" (list $root $fcfg $idx) }}'
            items:
              - key: '{{ default "content" $fcfg.subPath }}'
                path: '{{ default "content" $fcfg.subPath }}'
          {{- end }}
        {{- end }}
      {{- end }}
